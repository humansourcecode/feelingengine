name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit -v

      - name: Mode 1 smoke test
        run: |
          python examples/analyze_speech.py \
            --profiles tests/unit/fixtures/tiny_profiles.json \
            --no-layer4 --no-fire \
            > mode1_output.txt
          grep -q "Emotional Arc" mode1_output.txt

  build-check:
    name: Package builds cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify artifacts
        run: |
          ls -lh dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl
